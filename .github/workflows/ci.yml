name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy api/ --ignore-missing-imports --no-strict-optional
        continue-on-error: false

      - name: Download dataset (if not cached)
        run: |
          mkdir -p data/raw
          test -f data/raw/KDDTrain.txt || \
            curl -s -o data/raw/KDDTrain.txt https://raw.githubusercontent.com/Jehuty4949/NSL_KDD/master/KDDTrain%2B.txt
          test -f data/raw/KDDTest.txt || \
            curl -s -o data/raw/KDDTest.txt https://raw.githubusercontent.com/Jehuty4949/NSL_KDD/master/KDDTest%2B.txt

      - name: Train model (generates artifacts tests depend on)
        run: python train_model.py

      - name: Run tests with coverage
        run: pytest api/tests/ -v --cov=api --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-nids
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t nids-api:latest .

      - name: Build Dashboard image
        run: docker build -f Dockerfile.dashboard -t nids-dashboard:latest .
